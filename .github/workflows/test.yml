name: Test

on:
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Lint
        run: make lint

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Build
        run: make build

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fuzz nginx parsers
        run: |
          go test ./nginx/ -fuzz=FuzzParseField -fuzztime=30s
          go test ./nginx/ -fuzz=FuzzParseLogs -fuzztime=30s
          go test ./nginx/ -fuzz=FuzzParseJSONLogs -fuzztime=30s

      - name: Fuzz filter
        run: go test ./filter/ -fuzz=FuzzChainApply -fuzztime=30s

  validate-k8s-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | \
            sudo tar -xz -C /usr/local/bin kubeconform

      - name: Validate Kubernetes manifests
        run: make validate-k8s-manifests

  integration-test:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.12
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
          CLICKHOUSE_PASSWORD: ""
        options: >-
          --health-cmd "clickhouse-client --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Integration tests
        run: make test-integration
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "9000"

      - name: E2E tests
        run: make test-e2e
        env:
          CLICKHOUSE_HOST: localhost
          CLICKHOUSE_PORT: "9000"
