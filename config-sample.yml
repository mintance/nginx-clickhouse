# Settings
settings:
  interval: 5 # in seconds
  log_path: logs/test.log # path to logfile
  seek_from_end: false # start reading from the last line (to prevent duplicates after restart)
  max_buffer_size: 10000 # max log lines to buffer before forcing a flush (prevents memory issues)
  buffer:
    type: memory              # "memory" (default) or "disk"
    # disk_path: /var/lib/nginx-clickhouse/buffer  # directory for disk buffer segments
    # max_disk_bytes: 1073741824                    # 1GB max disk usage
  circuit_breaker:
    enabled: false            # enable circuit breaker
    threshold: 5              # consecutive failures before opening
    cooldown_secs: 60         # seconds before half-open probe
  enrichments:
    hostname: auto           # "auto" resolves to os.Hostname(), or a literal value
    environment: production
    service: my-api
    # extra:                 # arbitrary key-value pairs
    #   datacenter: us-east-1
    #   cluster: web-prod
# ClickHouse credentials
clickhouse:
 db: metrics
 table: nginx
 host: localhost
 port: 9000
 # tls: false                          # enable TLS (use port 9440 for ClickHouse secure native)
 # tls_insecure_skip_verify: false     # skip certificate verification (not recommended)
 # ca_cert: /etc/ssl/clickhouse-ca.pem # path to custom CA certificate
 credentials:
  user: default
  password:
 columns:
   RemoteAddr: remote_addr
   RemoteUser: remote_user
   TimeLocal: time_local
   Request: request
   Status: status
   BytesSent: bytes_sent
   HttpReferer: http_referer
   HttpUserAgent: http_user_agent
   # Hostname: _hostname           # enrichment: from settings.enrichments.hostname
   # StatusClass: _status_class    # enrichment: derived from status (2xx, 3xx, etc.)

# NGINX
nginx:
  log_type: main
  # log_format_type: json    # "text" (default) or "json"
  log_format: $remote_addr - $remote_user [$time_local] "$request" $status $bytes_sent "$http_referer" "$http_user_agent"
