# Example Secret for ClickHouse credentials.
# In production, use your own secret management (ExternalSecrets, Vault, sealed-secrets, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: nginx-clickhouse-credentials
  labels:
    app.kubernetes.io/name: nginx-clickhouse
type: Opaque
stringData:
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: ""
