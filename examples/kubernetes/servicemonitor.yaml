# ServiceMonitor for Prometheus Operator.
# Requires the Prometheus Operator CRDs to be installed.
# If you use annotation-based scraping instead, the pod annotations
# in the Deployment/DaemonSet are sufficient — you can skip this file.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nginx-clickhouse
  labels:
    app.kubernetes.io/name: nginx-clickhouse
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-clickhouse
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
---
# Service to expose the metrics port (required for ServiceMonitor).
apiVersion: v1
kind: Service
metadata:
  name: nginx-clickhouse-metrics
  labels:
    app.kubernetes.io/name: nginx-clickhouse
spec:
  selector:
    app.kubernetes.io/name: nginx-clickhouse
  ports:
    - name: metrics
      port: 2112
      targetPort: 2112
  clusterIP: None
