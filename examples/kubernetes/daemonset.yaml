# DaemonSet deployment: one nginx-clickhouse per node,
# reading from a hostPath log directory (e.g. for NGINX ingress controller logs).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-clickhouse
  labels:
    app.kubernetes.io/name: nginx-clickhouse
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-clickhouse
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2112"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: nginx-clickhouse
          image: mintance/nginx-clickhouse:latest
          args: ["-config_path", "/etc/nginx-clickhouse/config.yml"]
          ports:
            - name: metrics
              containerPort: 2112
          envFrom:
            - secretRef:
                name: nginx-clickhouse-credentials
          env:
            - name: ENRICHMENT_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ENRICHMENT_EXTRA_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: ENRICHMENT_EXTRA_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ENRICHMENT_EXTRA_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          volumeMounts:
            - name: nginx-logs
              mountPath: /var/log/nginx
              readOnly: true
            - name: config
              mountPath: /etc/nginx-clickhouse
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 2112
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 2112
            initialDelaySeconds: 5
            periodSeconds: 10
          # resources:
          #   requests:
          #     cpu: 50m
          #     memory: 64Mi
          #   limits:
          #     cpu: 200m
          #     memory: 128Mi

      volumes:
        - name: nginx-logs
          hostPath:
            path: /var/log/nginx
            type: Directory
        - name: config
          configMap:
            name: nginx-clickhouse

      # nodeSelector:
      #   kubernetes.io/os: linux
      # tolerations:
      #   - key: node-role.kubernetes.io/control-plane
      #     operator: Exists
      #     effect: NoSchedule
